<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IcebergPM | Area Cliente</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .header-controls { display: flex; gap: 1rem; align-items: center; }
        .user-info { color: var(--text-secondary); font-size: 0.9rem; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content { max-width: 500px; width: 90%; }
        .badge-internal { background: rgba(139, 92, 246, 0.2); color: #a78bfa; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; margin-left: 5px;}
        .badge-tag {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="img/logo.png" alt="IcebergPM Logo">
            Iceberg<span>PM</span> <small style="font-size: 0.6rem; color: var(--text-secondary); vertical-align: middle; margin-left: 5px;" id="appVersion">v...</small>
        </div>
        <div class="header-controls">
            <span class="user-info" id="userInfo"></span>
            <button class="btn" style="background: var(--danger);" onclick="auth.logout()">Logout</button>
        </div>
    </header>

    <main class="container">
        <h1>I Tuoi Progetti</h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Vedi lo stato di avanzamento e gestisci i tuoi task.</p>

        <div id="projectsGrid" class="projects-grid">
            <!-- Progetti caricati via JS -->
        </div>

        <div id="projectDetail" style="display: none; margin-top: 3rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 id="currentProjectTitle">Dettagli Progetto</h2>
                <button class="btn btn-primary" onclick="showNewItemModal()">Aggiungi Task</button>
            </div>

            <!-- Barra di Ricerca e Filtri -->
            <div id="filterBar" class="filter-bar">
                <div class="search-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="filterSearch" placeholder="Cerca i tuoi task..." oninput="applyFilters()">
                </div>
                
                <div class="filter-group">
                    <select id="filterStatus" class="filter-select" onchange="applyFilters()">
                        <option value="">Tutti gli Stati</option>
                        <option value="OPEN">Aperto</option>
                        <option value="IN_PROGRESS">In Corso</option>
                        <option value="DONE">Completato</option>
                        <option value="CLOSED">Chiuso</option>
                    </select>
                    <button class="btn-icon-clear" onclick="resetFilters()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
                        Reset
                    </button>
                </div>
            </div>
            
            <div class="glass-card" style="padding: 0;">
                <div id="itemsList">
                    <!-- Items caricati via JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Nuovo/Modifica Item -->
    <div id="itemModal" class="modal">
        <div class="glass-card modal-content" style="max-width: 600px;">
            <h3 id="itemModalTitle">Nuovo Task</h3>
            <form id="itemForm" style="margin-top: 1rem;">
                <div class="form-group">
                    <label>Titolo</label>
                    <input type="text" id="itemTitle" required>
                </div>
                <div class="form-group">
                    <label>Descrizione</label>
                    <textarea id="itemDesc" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label>Stato</label>
                    <select id="itemStatus">
                        <option value="OPEN">Aperto</option>
                        <option value="IN_PROGRESS">In Corso</option>
                        <option value="DONE">Completato</option>
                        <option value="CLOSED">Chiuso</option>
                    </select>
                </div>
                <!-- Nuovi campi -->
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>External ID</label>
                        <input type="text" id="itemExternalId">
                    </div>
                    <div class="form-group">
                        <label>ID Univoco</label>
                        <input type="text" id="itemUniqueId" readonly style="background: rgba(255,255,255,0.05); color: var(--text-secondary);">
                    </div>
                    <div class="form-group">
                        <label>Tag</label>
                        <input type="text" id="itemTag">
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>HLR</label>
                        <input type="text" id="itemHlr">
                    </div>
                    <div class="form-group">
                        <label>SRS</label>
                        <input type="text" id="itemSrs">
                    </div>
                    <div class="form-group">
                        <label>TP</label>
                        <input type="text" id="itemTp">
                    </div>
                </div>
                <div class="modal-footer" style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                    <button type="button" class="btn" onclick="hideModals()">Annulla</button>
                    <button type="submit" class="btn btn-primary" id="itemSubmitBtn">Salva Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        if (!auth.isLoggedIn()) window.location.href = 'index.html';
        const user = auth.getUser();
        document.getElementById('userInfo').textContent = `${user.username} (Cliente)`;

        auth.getVersion().then(v => {
            document.getElementById('appVersion').textContent = `v${v}`;
        });

        let currentProjectId = null;
        let currentProjectItems = [];
        let editingItemId = null;

        function getPriorityColor(p) {
            switch(p) {
                case 'CRITICAL': return '#ef4444';
                case 'HIGH': return '#f59e0b';
                case 'MEDIUM': return '#3b82f6';
                case 'LOW': return '#10b981';
                default: return '#6b7280';
            }
        }

        async function loadProjects() {
            const res = await auth.fetch('/projects/');
            const projects = await res.json();
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = projects.map(p => `
                <div class="glass-card project-card" onclick="loadProjectDetail(${p.id}, '${p.name}')">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <h3>${p.name}</h3>
                        <div class="status-badge" style="background: rgba(56, 189, 248, 0.1); color: var(--accent-color);">${p.items_count} Task</div>
                    </div>
                </div>
            `).join('');
        }

        async function loadProjectDetail(id, name) {
            currentProjectId = id;
            document.getElementById('currentProjectTitle').textContent = name;
            document.getElementById('projectDetail').style.display = 'block';
            
            const res = await auth.fetch(`/projects/${id}`);
            const project = await res.json();
            currentProjectItems = project.items;
            
            renderItems(currentProjectItems);
            document.getElementById('projectDetail').scrollIntoView({ behavior: 'smooth' });
        }

        function resetFilters() {
            document.getElementById('filterSearch').value = '';
            document.getElementById('filterStatus').value = '';
            applyFilters();
        }

        function applyFilters() {
            const query = document.getElementById('filterSearch').value.toLowerCase();
            const status = document.getElementById('filterStatus').value;

            const filtered = currentProjectItems.filter(item => {
                const matchesSearch = item.title.toLowerCase().includes(query) || 
                                     (item.description && item.description.toLowerCase().includes(query)) ||
                                     item.unique_id.toLowerCase().includes(query) ||
                                     (item.external_id && item.external_id.toLowerCase().includes(query));
                const matchesStatus = !status || item.status === status;

                return matchesSearch && matchesStatus;
            });

            renderItems(filtered);
        }

        function renderItems(items) {
            const list = document.getElementById('itemsList');
            if (items.length === 0) {
                list.innerHTML = '<div style="padding: 2rem; text-align: center; color: var(--text-secondary);">Nessun task trovato.</div>';
                return;
            }

            list.innerHTML = items.map((item) => {
                // Find original index for modal editing
                const originalIndex = currentProjectItems.findIndex(i => i.id === item.id);
                return `
                <div class="item-row">
                    <div style="flex: 1;">
                        <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 5px;">
                            <span style="font-weight: 600; font-size: 1.05rem;">${item.title}</span>
                            <span class="status-badge status-${item.status}" style="font-size: 0.65rem; padding: 2px 8px;">${item.status}</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px;">
                            <span class="badge-tag" style="background: rgba(167, 139, 250, 0.1); color: #a78bfa;"># ${item.unique_id}</span>
                            ${item.external_id ? `<span class="badge-tag" style="background: rgba(56, 189, 248, 0.1); color: var(--accent-color);">EXT: ${item.external_id}</span>` : ''}
                            <span class="badge-tag" style="background: ${getPriorityColor(item.internal_priority)}; color: white; opacity: 0.8;">PR: ${item.internal_priority || 'MEDIUM'}</span>
                            ${item.tag ? `<span class="badge-tag" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-color);">${item.tag}</span>` : ''}
                        </div>
                        <div style="font-size: 0.88rem; color: var(--text-secondary); line-height: 1.4;">${item.description || 'Nessuna descrizione'}</div>
                        <div style="display: flex; flex-wrap: wrap; gap: 0.8rem; margin-top: 10px; font-size: 0.72rem; color: var(--text-secondary); border-top: 1px solid rgba(255,255,255,0.03); padding-top: 8px;">
                            <span><strong>Creato:</strong> ${new Date(item.created_at).toLocaleString('it-IT', {day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'})}</span>
                            ${item.completed_at ? `<span style="color: #10b981;"><strong>Completato:</strong> ${new Date(item.completed_at).toLocaleString('it-IT', {day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'})}</span>` : ''}
                            ${item.hlr ? `<span><strong>HLR:</strong> <span style="color: var(--text-main);">${item.hlr}</span></span>` : ''}
                            ${item.srs ? `<span><strong>SRS:</strong> <span style="color: var(--text-main);">${item.srs}</span></span>` : ''}
                            ${item.tp ? `<span><strong>TP:</strong> <span style="color: var(--text-main);">${item.tp}</span></span>` : ''}
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 1rem; padding-left: 1rem;">
                        <button class="btn-action btn-view" onclick="showEditItemModalByIndex(${originalIndex})" data-tooltip="Dettagli">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>
            `}).join('');
        }

        function showNewItemModal() {
            editingItemId = null;
            document.getElementById('itemModalTitle').textContent = 'Nuovo Task';
            document.getElementById('itemSubmitBtn').textContent = 'Crea';
            document.getElementById('itemStatus').value = 'OPEN';
            document.getElementById('itemUniqueId').value = 'Auto-generato';
            document.getElementById('itemModal').style.display = 'flex';
        }

        function showEditItemModalByIndex(index) {
            const item = currentProjectItems[index];
            editingItemId = item.id;
            document.getElementById('itemModalTitle').textContent = 'Modifica Task';
            document.getElementById('itemSubmitBtn').textContent = 'Salva Modifiche';
            
            document.getElementById('itemTitle').value = item.title;
            document.getElementById('itemDesc').value = item.description || '';
            document.getElementById('itemStatus').value = item.status;
            
            document.getElementById('itemExternalId').value = item.external_id || '';
            document.getElementById('itemUniqueId').value = item.unique_id || '';
            document.getElementById('itemTag').value = item.tag || '';
            document.getElementById('itemHlr').value = item.hlr || '';
            document.getElementById('itemSrs').value = item.srs || '';
            document.getElementById('itemTp').value = item.tp || '';
            
            document.getElementById('itemModal').style.display = 'flex';
        }

        function hideModals() {
            document.getElementById('itemModal').style.display = 'none';
        }

        document.getElementById('itemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const payload = {
                    title: document.getElementById('itemTitle').value,
                    description: document.getElementById('itemDesc').value,
                    status: document.getElementById('itemStatus').value,
                    tag: document.getElementById('itemTag').value,
                    hlr: document.getElementById('itemHlr').value,
                    srs: document.getElementById('itemSrs').value,
                    tp: document.getElementById('itemTp').value,
                    external_id: document.getElementById('itemExternalId').value,
                    project_id: currentProjectId
                };

                const url = editingItemId ? `/items/${editingItemId}` : '/items/';
                const method = editingItemId ? 'PATCH' : 'POST';

                const res = await auth.fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const err = await res.json();
                    alert("Errore salvataggio: " + JSON.stringify(err.detail));
                    return;
                }

                hideModals();
                loadProjectDetail(currentProjectId, document.getElementById('currentProjectTitle').textContent);
            } catch (err) {
                alert("Errore imprevisto: " + err.message);
            }
        });

        loadProjects();
    </script>
</body>
</html>

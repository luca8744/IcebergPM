<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IcebergPM | Area Cliente</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .header-controls { display: flex; gap: 1rem; align-items: center; }
        .user-info { color: var(--text-secondary); font-size: 0.9rem; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content { 
            max-width: 500px; 
            width: 90%; 
            max-height: 90vh;
            overflow-y: auto;
        }
        .badge-internal { background: rgba(139, 92, 246, 0.2); color: #a78bfa; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; margin-left: 5px;}
        .badge-tag {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
        }

        /* Multi-select filter dropdown */
        .multi-select {
            position: relative;
            min-width: 160px;
        }

        .multi-select-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            padding: 0.6rem 0.9rem;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
            user-select: none;
            white-space: nowrap;
        }

        .multi-select-toggle:hover {
            border-color: var(--accent-color);
        }

        .multi-select.open .multi-select-toggle {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.15);
        }

        .multi-select-toggle .ms-arrow {
            width: 0;
            height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 5px solid var(--text-secondary);
            transition: transform 0.2s;
        }

        .multi-select.open .ms-arrow {
            transform: rotate(180deg);
        }

        .ms-count {
            background: var(--accent-color);
            color: var(--bg-color);
            font-size: 0.65rem;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
            line-height: 1.4;
        }

        .multi-select-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            min-width: 100%;
            max-height: 240px;
            overflow-y: auto;
            background: #1e293b;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            z-index: 100;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
            padding: 0.35rem 0;
            animation: msDropIn 0.15s ease-out;
        }

        @keyframes msDropIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .multi-select.open .multi-select-dropdown {
            display: block;
        }

        .multi-select-dropdown label {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem 0.9rem;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-primary);
            transition: background 0.15s;
            white-space: nowrap;
        }

        .multi-select-dropdown label:hover {
            background: rgba(56, 189, 248, 0.1);
        }

        .multi-select-dropdown input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent-color);
            cursor: pointer;
            flex-shrink: 0;
        }

        .multi-select-dropdown .ms-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="img/logo.png" alt="IcebergPM Logo">
            Iceberg<span>PM</span> <small style="font-size: 0.6rem; color: var(--text-secondary); vertical-align: middle; margin-left: 5px;" id="appVersion">v...</small>
        </div>
        <div class="header-controls">
            <span class="user-info" id="userInfo"></span>
            <button class="btn" style="background: var(--danger);" onclick="auth.logout()">Logout</button>
        </div>
    </header>

    <main class="container">
        <h1>I Tuoi Progetti</h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Vedi lo stato di avanzamento e gestisci i tuoi task.</p>

        <div id="projectsGrid" class="projects-grid">
            <!-- Progetti caricati via JS -->
        </div>

        <div id="projectDetail" style="display: none; margin-top: 3rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <h2 id="currentProjectTitle" style="margin: 0;">Dettagli Progetto</h2>
                    <span id="filteredCountBadge" class="status-badge" style="background: rgba(167, 139, 250, 0.1); color: #a78bfa; display: none; font-size: 0.9rem; padding: 4px 10px;">0 Task</span>
                </div>
                <div style="display: flex; gap: 0.75rem; align-items: center;">
                    <button class="btn btn-secondary" id="exportCsvBtn" onclick="exportItemsToCSV()" title="Esporta i task visibili in CSV" style="display: flex; align-items: center; gap: 0.5rem;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Esporta CSV
                    </button>
                    <button class="btn btn-primary" onclick="showNewItemModal()">Aggiungi Task</button>
                </div>
            </div>

            <!-- Barra di Ricerca e Filtri -->
            <div id="filterBar" class="filter-bar">
                <div class="search-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="filterSearch" placeholder="Cerca per titolo, descrizione o ID..." oninput="applyFilters()">
                </div>
                
                <div class="filter-group">
                    <div class="multi-select" id="filterStatusMs">
                        <div class="multi-select-toggle" onclick="toggleMultiSelect('filterStatusMs')">
                            <span class="ms-label">Stato</span>
                            <span class="ms-count" style="display:none;">0</span>
                            <span class="ms-arrow"></span>
                        </div>
                        <div class="multi-select-dropdown">
                            <label><input type="checkbox" value="OPEN" onchange="applyFilters()"><span class="ms-dot" style="background:#38bdf8;"></span> Aperto</label>
                            <label><input type="checkbox" value="IN_PROGRESS" onchange="applyFilters()"><span class="ms-dot" style="background:#f59e0b;"></span> In Corso</label>
                            <label><input type="checkbox" value="DONE" onchange="applyFilters()"><span class="ms-dot" style="background:#10b981;"></span> Completato</label>
                        </div>
                    </div>
                    <div class="multi-select" id="filterPriorityMs">
                        <div class="multi-select-toggle" onclick="toggleMultiSelect('filterPriorityMs')">
                            <span class="ms-label">Priorità</span>
                            <span class="ms-count" style="display:none;">0</span>
                            <span class="ms-arrow"></span>
                        </div>
                        <div class="multi-select-dropdown">
                            <label><input type="checkbox" value="LOW" onchange="applyFilters()"><span class="ms-dot" style="background:#10b981;"></span> Bassa</label>
                            <label><input type="checkbox" value="MEDIUM" onchange="applyFilters()"><span class="ms-dot" style="background:#3b82f6;"></span> Media</label>
                            <label><input type="checkbox" value="HIGH" onchange="applyFilters()"><span class="ms-dot" style="background:#f59e0b;"></span> Alta</label>
                            <label><input type="checkbox" value="CRITICAL" onchange="applyFilters()"><span class="ms-dot" style="background:#ef4444;"></span> Critica</label>
                        </div>
                    </div>
                    <div class="multi-select" id="filterTagMs">
                        <div class="multi-select-toggle" onclick="toggleMultiSelect('filterTagMs')">
                            <span class="ms-label">Tag</span>
                            <span class="ms-count" style="display:none;">0</span>
                            <span class="ms-arrow"></span>
                        </div>
                        <div class="multi-select-dropdown" id="filterTagDropdown">
                            <!-- Populated via JS -->
                        </div>
                    </div>
                    <div class="multi-select" id="filterSubmoduleMs">
                        <div class="multi-select-toggle" onclick="toggleMultiSelect('filterSubmoduleMs')">
                            <span class="ms-label">Sottomodulo</span>
                            <span class="ms-count" style="display:none;">0</span>
                            <span class="ms-arrow"></span>
                        </div>
                        <div class="multi-select-dropdown" id="filterSubmoduleDropdown">
                            <!-- Populated via JS -->
                        </div>
                    </div>
                    <button class="btn btn-secondary" id="sortDateBtn" onclick="toggleSort()" style="display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 0.9rem; background: rgba(15, 23, 42, 0.8); border: 1px solid var(--border-color); color: var(--text-primary);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5h10"></path><path d="M11 9h7"></path><path d="M11 13h4"></path><path d="M3 17l3 3 3-3"></path><path d="M6 18V4"></path></svg>
                        <span id="sortLabel">Data (Recenti)</span>
                    </button>
                    <button class="btn-icon-clear" onclick="resetFilters()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
                        Reset
                    </button>
                </div>
            </div>
            
            <div class="glass-card" style="padding: 0;">
                <div id="itemsList">
                    <!-- Items caricati via JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Nuovo/Modifica Item -->
    <div id="itemModal" class="modal">
        <div class="glass-card modal-content" style="max-width: 600px;">
            <h3 id="itemModalTitle">Nuovo Task</h3>
            <form id="itemForm" style="margin-top: 1rem;">
                <div class="form-group">
                    <label>Titolo</label>
                    <input type="text" id="itemTitle" required>
                </div>
                <div class="form-group">
                    <label>Descrizione</label>
                    <textarea id="itemDesc" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label>Stato</label>
                    <select id="itemStatus">
                        <option value="OPEN">Aperto</option>
                        <option value="IN_PROGRESS">In Corso</option>
                        <option value="DONE">Completato</option>
                    </select>
                </div>
                <!-- Nuovi campi -->
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>External ID</label>
                        <input type="text" id="itemExternalId">
                    </div>
                    <div class="form-group">
                        <label>ID Univoco</label>
                        <input type="text" id="itemUniqueId" readonly style="background: rgba(255,255,255,0.05); color: var(--text-secondary);">
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Tag</label>
                        <div id="itemTagsContainer" style="display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; min-height: 45px; background: rgba(0,0,0,0.2);">
                            <!-- Caricati via JS -->
                        </div>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>HLR</label>
                        <input type="text" id="itemHlr">
                    </div>
                    <div class="form-group">
                        <label>SRS</label>
                        <input type="text" id="itemSrs">
                    </div>
                    <div class="form-group">
                        <label>TP</label>
                        <input type="text" id="itemTp">
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Rev Finding</label>
                        <input type="text" id="itemRevFinding">
                    </div>
                    <div class="form-group">
                        <label>Rev Released</label>
                        <input type="text" id="itemRevReleased">
                    </div>
                    <div class="form-group">
                        <label>Sottomodulo</label>
                        <input type="text" id="itemSubmodule">
                    </div>
                </div>
                <div class="form-group" id="notesSectionContainer" style="display: none; border-top: 1px solid var(--border-color); padding-top: 1rem; margin-top: 1rem;">
                    <label>Conversazione / Note</label>
                    <div id="itemNotesList" style="max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.85rem; display: flex; flex-direction: column; gap: 8px;">
                        <!-- Note caricate via JS -->
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="newItemNote" placeholder="Aggiungi una nota..." style="flex: 1;">
                        <button type="button" class="btn btn-secondary" onclick="addNote()" title="Aggiungi Nota" style="display: flex; align-items: center; justify-content: center; padding: 0.5rem 0.8rem;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                    </div>
                </div>
                <div class="modal-footer" style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                    <button type="button" class="btn" onclick="hideModals()">Annulla</button>
                    <button type="submit" class="btn btn-primary" id="itemSubmitBtn">Salva Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        if (!auth.isLoggedIn()) window.location.href = 'index.html';
        const user = auth.getUser();
        const clientName = user.client ? user.client.name : 'Nessuna Azienda';
        document.getElementById('userInfo').textContent = `${user.username} @ ${clientName}`;

        auth.getVersion().then(v => {
            document.getElementById('appVersion').textContent = `v${v}`;
        });

        let currentProjectId = null;
        let currentProjectItems = [];
        let currentFilteredItems = [];
        let editingItemId = null;
        let currentSort = 'desc';

        function toggleSort() {
            currentSort = currentSort === 'desc' ? 'asc' : 'desc';
            document.getElementById('sortLabel').textContent = currentSort === 'desc' ? 'Data (Recenti)' : 'Data (Meno recenti)';
            applyFilters();
        }

        function getPriorityColor(p) {
            switch(p) {
                case 'CRITICAL': return '#ef4444';
                case 'HIGH': return '#f59e0b';
                case 'MEDIUM': return '#3b82f6';
                case 'LOW': return '#10b981';
                default: return '#6b7280';
            }
        }

        async function loadProjects() {
            const res = await auth.fetch('/projects/');
            const projects = await res.json();
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = projects.map(p => `
                <div class="glass-card project-card" onclick="loadProjectDetail(${p.id}, '${p.name}')">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <h3>${p.name}</h3>
                        <div class="status-badge" style="background: rgba(56, 189, 248, 0.1); color: var(--accent-color);">${p.items_count} Task</div>
                    </div>
                </div>
            `).join('');
        }

        async function loadProjectDetail(id, name) {
            currentProjectId = id;
            document.getElementById('currentProjectTitle').textContent = name;
            document.getElementById('projectDetail').style.display = 'block';
            
            const res = await auth.fetch(`/projects/${id}`);
            const project = await res.json();
            currentProjectItems = project.items;
            
            // Popola il filtro tag (multi-select)
            const uniqueTags = new Map();
            currentProjectItems.forEach(item => {
                if (item.tags) {
                    item.tags.forEach(t => uniqueTags.set(t.id, { name: t.name, color: t.color || '#6b7280' }));
                }
            });
            const tagDropdown = document.getElementById('filterTagDropdown');
            if (tagDropdown) {
                tagDropdown.innerHTML = Array.from(uniqueTags.entries()).map(([id, tag]) => 
                    `<label><input type="checkbox" value="${id}" onchange="applyFilters()"><span class="ms-dot" style="background:${tag.color};"></span> ${tag.name}</label>`
                ).join('') || '<span style="padding: 0.5rem 0.9rem; font-size: 0.8rem; color: var(--text-secondary);">Nessun tag</span>';
            }

            // Popola il filtro sottomoduli
            const uniqueSubmodules = new Set();
            currentProjectItems.forEach(item => {
                if (item.submodule) uniqueSubmodules.add(item.submodule);
            });
            const subDropdown = document.getElementById('filterSubmoduleDropdown');
            if (subDropdown) {
                if (uniqueSubmodules.size > 0) {
                    subDropdown.innerHTML = Array.from(uniqueSubmodules).sort().map(sub => 
                        `<label><input type="checkbox" value="${sub}" onchange="applyFilters()"><span class="ms-dot" style="background:#8b5cf6;"></span> ${sub}</label>`
                    ).join('');
                } else {
                    subDropdown.innerHTML = '<span style="padding: 0.5rem 0.9rem; font-size: 0.8rem; color: var(--text-secondary);">Nessun sottomodulo</span>';
                }
            }

            applyFilters();
            document.getElementById('projectDetail').scrollIntoView({ behavior: 'smooth' });
        }

        // --- Multi-select helpers ---
        function toggleMultiSelect(id) {
            const el = document.getElementById(id);
            const wasOpen = el.classList.contains('open');
            // Close all others first
            document.querySelectorAll('.multi-select.open').forEach(ms => ms.classList.remove('open'));
            if (!wasOpen) el.classList.add('open');
        }

        // Close dropdowns when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.multi-select')) {
                document.querySelectorAll('.multi-select.open').forEach(ms => ms.classList.remove('open'));
            }
        });

        function getMultiSelectValues(containerId) {
            const container = document.getElementById(containerId);
            return Array.from(container.querySelectorAll('.multi-select-dropdown input[type="checkbox"]:checked')).map(cb => cb.value);
        }

        function updateMultiSelectCount(containerId) {
            const container = document.getElementById(containerId);
            const count = container.querySelectorAll('.multi-select-dropdown input[type="checkbox"]:checked').length;
            const badge = container.querySelector('.ms-count');
            if (count > 0) {
                badge.textContent = count;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        }

        function resetFilters() {
            document.getElementById('filterSearch').value = '';
            document.querySelectorAll('.multi-select .multi-select-dropdown input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.querySelectorAll('.multi-select').forEach(ms => {
                const badge = ms.querySelector('.ms-count');
                if (badge) { badge.style.display = 'none'; badge.textContent = '0'; }
            });
            applyFilters();
        }

        function applyFilters() {
            const query = document.getElementById('filterSearch').value.toLowerCase();
            const statuses = getMultiSelectValues('filterStatusMs');
            const priorities = getMultiSelectValues('filterPriorityMs');
            const tagIds = getMultiSelectValues('filterTagMs');
            const submodules = getMultiSelectValues('filterSubmoduleMs');

            updateMultiSelectCount('filterStatusMs');
            updateMultiSelectCount('filterPriorityMs');
            updateMultiSelectCount('filterTagMs');
            updateMultiSelectCount('filterSubmoduleMs');

            const filtered = currentProjectItems.filter(item => {
                const queryTitle = (item.title || '').toLowerCase();
                const queryDesc = (item.description || '').toLowerCase();
                const queryUid = (item.unique_id || '').toLowerCase();
                const queryExt = (item.external_id || '').toLowerCase();

                const matchesSearch = queryTitle.includes(query) || 
                                     queryDesc.includes(query) ||
                                     queryUid.includes(query) ||
                                     queryExt.includes(query);
                const matchesStatus = statuses.length === 0 || statuses.includes(item.status);
                const matchesPriority = priorities.length === 0 || priorities.includes(item.internal_priority);
                const matchesTag = tagIds.length === 0 || (item.tags && item.tags.some(t => tagIds.includes(String(t.id))));
                const matchesSubmodule = submodules.length === 0 || (item.submodule && submodules.includes(item.submodule));

                return matchesSearch && matchesStatus && matchesPriority && matchesTag && matchesSubmodule;
            });

            filtered.sort((a, b) => {
                const dateA = new Date(a.created_at).getTime();
                const dateB = new Date(b.created_at).getTime();
                return currentSort === 'desc' ? dateB - dateA : dateA - dateB;
            });

            currentFilteredItems = filtered;

            const badge = document.getElementById('filteredCountBadge');
            if (badge) {
                badge.textContent = filtered.length + (filtered.length === 1 ? ' Task trovato' : ' Task trovati');
                badge.style.display = 'inline-block';
            }

            renderItems(filtered);
        }

        function exportItemsToCSV() {
            if (!currentFilteredItems || currentFilteredItems.length === 0) {
                alert('Nessun task da esportare. Assicurati di avere un progetto aperto.');
                return;
            }

            const csvEscape = (val) => {
                if (val === null || val === undefined) return '';
                const s = String(val);
                if (s.includes(',') || s.includes('\n') || s.includes('"')) {
                    return '"' + s.replace(/"/g, '""') + '"';
                }
                return s;
            };

            const headers = [
                'ID', 'Unique ID', 'External ID', 'Titolo', 'Stato',
                'Sottomodulo', 'Tag',
                'HLR', 'SRS', 'TP', 'Rev Finding', 'Rev Released',
                'Descrizione', 'Note',
                'Creato', 'Completato'
            ];

            const rows = currentFilteredItems.map(item => [
                csvEscape(item.id),
                csvEscape(item.unique_id),
                csvEscape(item.external_id),
                csvEscape(item.title),
                csvEscape(item.status),
                csvEscape(item.submodule),
                csvEscape((item.tags || []).map(t => t.name).join('; ')),
                csvEscape(item.hlr),
                csvEscape(item.srs),
                csvEscape(item.tp),
                csvEscape(item.rev_finding),
                csvEscape(item.rev_released),
                csvEscape(item.description),
                csvEscape(item.notes ? item.notes.map(n => `[${new Date(n.created_at).toLocaleDateString()} ${n.user ? n.user.username : 'Sys'}]: ${n.content}`).join(' | ') : ''),
                csvEscape(item.created_at ? new Date(item.created_at).toLocaleString('it-IT') : ''),
                csvEscape(item.completed_at ? new Date(item.completed_at).toLocaleString('it-IT') : '')
            ].join(','));

            const csvContent = [headers.join(','), ...rows].join('\n');
            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });

            const projectName = document.getElementById('currentProjectTitle').textContent.replace(/[^a-zA-Z0-9_\-]/g, '_');
            const date = new Date().toISOString().slice(0, 10);
            const filename = `${projectName}_task_${date}.csv`;

            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function renderItems(items) {
            const list = document.getElementById('itemsList');
            if (items.length === 0) {
                list.innerHTML = '<div style="padding: 2rem; text-align: center; color: var(--text-secondary);">Nessun task trovato.</div>';
                return;
            }

            list.innerHTML = items.map((item) => {
                // Find original index for modal editing
                const originalIndex = currentProjectItems.findIndex(i => i.id === item.id);
                return `
                <div class="item-row">
                    <div style="flex: 1;">
                        <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 5px;">
                            <span style="font-weight: 600; font-size: 1.05rem;">${item.title}</span>
                            <span class="status-badge status-${item.status}" style="font-size: 0.65rem; padding: 2px 8px;">${item.status}</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;">
                            <span class="badge-tag" style="background: rgba(167, 139, 250, 0.1); color: #a78bfa;"># ${item.unique_id || '---'}</span>
                            ${item.external_id ? `<span class="badge-tag" style="background: rgba(56, 189, 248, 0.1); color: var(--accent-color);">EXT: ${item.external_id}</span>` : ''}
                            <span class="badge-tag" style="background: ${getPriorityColor(item.internal_priority)}; color: white; opacity: 0.8;">PR: ${item.internal_priority || 'MEDIUM'}</span>
                            ${item.submodule ? `<span class="badge-tag" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-secondary);">SUB: ${item.submodule}</span>` : ''}
                            ${item.tags ? item.tags.map(t => `<span class="badge-tag" style="background: ${t.color}; color: white;">${t.name}</span>`).join('') : ''}
                        </div>
                        <div style="font-size: 0.88rem; color: var(--text-secondary); line-height: 1.4;">${item.description || 'Nessuna descrizione'}</div>
                        <div style="display: flex; flex-wrap: wrap; gap: 0.8rem; margin-top: 10px; font-size: 0.72rem; color: var(--text-secondary); border-top: 1px solid rgba(255,255,255,0.03); padding-top: 8px;">
                            <span><strong>Creato:</strong> ${new Date(item.created_at).toLocaleString('it-IT', {day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'})}</span>
                            ${item.completed_at ? `<span style="color: #10b981;"><strong>Completato:</strong> ${new Date(item.completed_at).toLocaleString('it-IT', {day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'})}</span>` : ''}
                            ${item.hlr ? `<span><strong>HLR:</strong> <span style="color: var(--text-main);">${item.hlr}</span></span>` : ''}
                            ${item.srs ? `<span><strong>SRS:</strong> <span style="color: var(--text-main);">${item.srs}</span></span>` : ''}
                            ${item.tp ? `<span><strong>TP:</strong> <span style="color: var(--text-main);">${item.tp}</span></span>` : ''}
                            ${item.rev_finding ? `<span><strong>Rev Found:</strong> <span style="color: var(--text-main);">${item.rev_finding}</span></span>` : ''}
                            ${item.rev_released ? `<span><strong>Rev Rel:</strong> <span style="color: var(--text-main);">${item.rev_released}</span></span>` : ''}
                            ${item.submodule ? `<span><strong>Submod:</strong> <span style="color: var(--text-main);">${item.submodule}</span></span>` : ''}
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 1rem; padding-left: 1rem;">
                        <button class="btn-action btn-view" onclick="showEditItemModalByIndex(${originalIndex})" data-tooltip="Dettagli">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>
            `}).join('');
        }

        function showNewItemModal() {
            editingItemId = null;
            document.getElementById('itemForm').reset();
            document.getElementById('itemModalTitle').textContent = 'Nuovo Task';
            document.getElementById('itemSubmitBtn').textContent = 'Crea';
            document.getElementById('itemStatus').value = 'OPEN';
            document.getElementById('itemUniqueId').value = 'Auto-generato';
            document.getElementById('notesSectionContainer').style.display = 'none';
            document.getElementById('newItemNote').value = '';
            loadTagsForSelection([]);
            document.getElementById('itemModal').style.display = 'flex';
        }

        function showEditItemModalByIndex(index) {
            const item = currentProjectItems[index];
            editingItemId = item.id;
            document.getElementById('itemModalTitle').textContent = 'Modifica Task';
            document.getElementById('itemSubmitBtn').textContent = 'Salva Modifiche';
            
            document.getElementById('itemTitle').value = item.title;
            document.getElementById('itemDesc').value = item.description || '';
            document.getElementById('itemStatus').value = item.status;
            
            document.getElementById('itemExternalId').value = item.external_id || '';
            document.getElementById('itemUniqueId').value = item.unique_id || '';
            document.getElementById('itemHlr').value = item.hlr || '';
            document.getElementById('itemSrs').value = item.srs || '';
            document.getElementById('itemTp').value = item.tp || '';
            document.getElementById('itemRevFinding').value = item.rev_finding || '';
            document.getElementById('itemRevReleased').value = item.rev_released || '';
            document.getElementById('itemSubmodule').value = item.submodule || '';
            
            // Load notes
            document.getElementById('notesSectionContainer').style.display = 'block';
            document.getElementById('newItemNote').value = '';
            renderNotes(item.notes || []);

            loadTagsForSelection(item.tags ? item.tags.map(t => t.id) : []);
            document.getElementById('itemModal').style.display = 'flex';
        }

        function renderNotes(notes) {
            const list = document.getElementById('itemNotesList');
            if (!notes || notes.length === 0) {
                list.innerHTML = '<div style="color: var(--text-secondary); text-align: center; padding: 10px;">Nessuna nota presente.</div>';
                return;
            }
            list.innerHTML = notes.map(n => `
                <div style="background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 6px; border-left: 3px solid var(--accent-color);">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.75rem; color: var(--text-secondary);">
                        <strong>${n.user ? n.user.username : 'Sistema'}</strong>
                        <span>${new Date(n.created_at).toLocaleString()}</span>
                    </div>
                    <div style="color: var(--text-primary); line-height: 1.4;">${n.content}</div>
                </div>
            `).join('');
            list.scrollTop = list.scrollHeight;
        }

        async function addNote() {
            const content = document.getElementById('newItemNote').value.trim();
            if (!content || !editingItemId) return;

            try {
                const res = await auth.fetch(`/items/${editingItemId}/notes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });

                if (res.ok) {
                    const newNote = await res.json();
                    document.getElementById('newItemNote').value = '';
                    
                    const item = currentProjectItems.find(i => i.id === editingItemId);
                    if (item) {
                        if (!item.notes) item.notes = [];
                        item.notes.push(newNote);
                        renderNotes(item.notes);
                    }
                } else {
                    const err = await res.json();
                    alert("Errore aggiunta nota: " + err.detail);
                }
            } catch (err) {
                alert("Errore: " + err.message);
            }
        }

        function hideModals() {
            document.getElementById('itemModal').style.display = 'none';
        }

        document.getElementById('itemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const payload = {
                    title: document.getElementById('itemTitle').value,
                    description: document.getElementById('itemDesc').value,
                    status: document.getElementById('itemStatus').value,
                    hlr: document.getElementById('itemHlr').value,
                    srs: document.getElementById('itemSrs').value,
                    tp: document.getElementById('itemTp').value,
                    rev_finding: document.getElementById('itemRevFinding').value,
                    rev_released: document.getElementById('itemRevReleased').value,
                    submodule: document.getElementById('itemSubmodule').value,
                    external_id: document.getElementById('itemExternalId').value,
                    project_id: currentProjectId,
                    tag_ids: Array.from(document.querySelectorAll('input[name="itemTags"]:checked')).map(i => parseInt(i.value))
                };

                const url = editingItemId ? `/items/${editingItemId}` : '/items/';
                const method = editingItemId ? 'PATCH' : 'POST';

                const res = await auth.fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const err = await res.json();
                    alert("Errore salvataggio: " + JSON.stringify(err.detail));
                    return;
                }

                hideModals();
                loadProjectDetail(currentProjectId, document.getElementById('currentProjectTitle').textContent);
            } catch (err) {
                alert("Errore imprevisto: " + err.message);
            }
        });

        async function loadTagsForSelection(selectedIds = []) {
            try {
                const res = await auth.fetch('/tags/');
                const tags = await res.json();
                const container = document.getElementById('itemTagsContainer');
                
                if (tags.length === 0) {
                    container.innerHTML = '<span style="font-size:0.8rem; color:var(--text-secondary);">Nessun tag disponibile.</span>';
                    return;
                }

                container.innerHTML = tags.map(t => `
                    <label style="display:flex; align-items:center; gap:4px; background:${t.color}; padding:2px 8px; border-radius:4px; font-size:0.75rem; cursor:pointer; color:white;">
                        <input type="checkbox" name="itemTags" value="${t.id}" ${selectedIds.includes(t.id) ? 'checked' : ''}>
                        ${t.name}
                    </label>
                `).join('');
            } catch (err) {
                console.error("Errore caricamento tag:", err);
            }
        }

        loadProjects();
    </script>
</body>
</html>
